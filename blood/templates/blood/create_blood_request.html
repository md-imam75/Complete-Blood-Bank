{% extends 'blood/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-24 p-4">
                <h2 class="fw-800 text-danger mb-4">Request Blood Units</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-danger w-100 py-3 rounded-15 fw-bold mt-3">
                        Submit Request
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
